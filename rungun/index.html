<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Commando Strike — Run &amp; Gun</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0d0b14">
<!-- iOS: fullskärm utan Safari-UI när appen läggs på hemskärmen -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Commando">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">

<style>
  html, body {
    margin: 0; padding: 0;
    background: #0d0b14;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
  }
  #wrap {
    position: fixed; inset: 0;
    /* håll spelet innanför notch/home-indicator i liggande läge */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    display: flex; align-items: center; justify-content: center;
    box-sizing: border-box;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    /* fyll ytan men behåll 16:9 — letterbox i stället för att sträcka */
    width: 100%; height: 100%;
    object-fit: contain;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="640" height="360"></canvas></div>
<script src="game.js"></script>
<script>
  // Service worker + uppdaterings-detektering (för mobil-webapp som inte kan
  // hård-ladda om). window.__updateReady sätts när en ny version installerats.
  window.__updateReady = false;
  if ('serviceWorker' in navigator) {
    addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        window.__swReg = reg;
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            // ny version klar OCH en gammal styr redan sidan = uppdatering finns
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              window.__updateReady = true;
            }
          });
        });
        // kolla efter ny version direkt vid start
        reg.update().catch(() => {});
      }).catch(() => {});
    });
  }
  // tvinga senaste versionen: nolla cacherna och ladda om
  window.forceReload = function () {
    const done = () => location.reload();
    if (window.caches && caches.keys) {
      caches.keys().then(ks => Promise.all(ks.map(k => caches.delete(k)))).then(done, done);
    } else done();
  };
</script>
</body>
</html>
